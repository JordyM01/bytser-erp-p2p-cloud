# .github/workflows/cd.yml
# Continuous Deployment — Infrastructure + Application
#
# Manual dispatch for both staging and production.
# Handles: terraform apply, docker pull, service restart, health check.

name: CD

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: erp-p2p-cloud

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: inputs.action == 'deploy' && inputs.environment == 'staging'
    environment:
      name: staging
      url: http://relay-staging.bytsers.com:8080/healthz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: deployments/terraform
        run: terraform init -backend-config=backend-staging.hcl

      - name: Terraform Apply
        working-directory: deployments/terraform
        run: |
          terraform apply -auto-approve \
            -var-file=environments/staging.tfvars

      - name: Deploy application via SSM
        working-directory: deployments/terraform
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          ECR_REPO=$(terraform output -raw ecr_repository_url)
          IMAGE_TAG="${{ inputs.image_tag }}"

          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          # Wait for SSM agent
          for i in {1..30}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || true)
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online"
              break
            fi
            echo "Waiting for SSM agent... ($i/30)"
            sleep 10
          done

          # Wait for cloud-init to finish (installs Docker + awscli)
          echo "Waiting for cloud-init to complete..."
          INIT_CMD=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters 'commands=["cloud-init status --wait"]' \
            --query "Command.CommandId" \
            --output text)

          for i in {1..60}; do
            INIT_STATUS=$(aws ssm get-command-invocation \
              --command-id "$INIT_CMD" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")
            if [ "$INIT_STATUS" = "Success" ]; then
              echo "cloud-init completed"
              break
            elif [ "$INIT_STATUS" = "Failed" ]; then
              echo "cloud-init failed"
              exit 1
            fi
            echo "Waiting for cloud-init... ($i/60)"
            sleep 10
          done

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters "commands=[
              \"set -eu\",
              \"export PATH=/usr/local/bin:/usr/bin:$PATH\",
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REPO}\",
              \"docker pull ${ECR_REPO}:${IMAGE_TAG}\",
              \"sudo sed -i 's|${ECR_REPO}:.*|${ECR_REPO}:${IMAGE_TAG}|' /etc/systemd/system/erp-p2p-cloud.service\",
              \"sudo systemctl daemon-reload\",
              \"sudo systemctl restart erp-p2p-cloud\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command: $COMMAND_ID"

          for i in {1..30}; do
            INVOCATION_STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")

            echo "Status: $INVOCATION_STATUS ($i/30)"

            if [ "$INVOCATION_STATUS" = "Success" ]; then
              echo "Deploy command completed"
              break
            elif [ "$INVOCATION_STATUS" = "Failed" ] || [ "$INVOCATION_STATUS" = "Cancelled" ] || [ "$INVOCATION_STATUS" = "TimedOut" ]; then
              echo "Deploy failed: $INVOCATION_STATUS"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text || true
              exit 1
            fi
            sleep 10
          done

      - name: Verify deployment
        working-directory: deployments/terraform
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)

          for i in {1..30}; do
            RESULT=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --instance-ids "$INSTANCE_ID" \
              --parameters 'commands=["curl -sf http://localhost:8080/readyz"]' \
              --query "Command.CommandId" \
              --output text)

            sleep 5

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$RESULT" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")

            if [ "$STATUS" = "Success" ]; then
              echo "Service is healthy!"
              exit 0
            fi
            echo "Waiting for healthy service... ($i/30)"
            sleep 10
          done
          echo "Health check timed out"
          exit 1

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: inputs.action == 'deploy' && inputs.environment == 'production'
    environment:
      name: production
      url: http://relay.bytsers.com:8080/healthz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: deployments/terraform
        run: terraform init -backend-config=backend-production.hcl

      - name: Terraform Plan
        working-directory: deployments/terraform
        run: |
          terraform plan \
            -var-file=environments/production.tfvars \
            -out=tfplan

      - name: Terraform Apply
        working-directory: deployments/terraform
        run: terraform apply tfplan

      - name: Deploy application via SSM
        working-directory: deployments/terraform
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          ECR_REPO=$(terraform output -raw ecr_repository_url)
          IMAGE_TAG="${{ inputs.image_tag }}"

          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          for i in {1..30}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || true)
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online"
              break
            fi
            echo "Waiting for SSM agent... ($i/30)"
            sleep 10
          done

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters "commands=[
              \"set -eu\",
              \"export PATH=/usr/local/bin:/usr/bin:$PATH\",
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REPO}\",
              \"docker pull ${ECR_REPO}:${IMAGE_TAG}\",
              \"sudo sed -i 's|${ECR_REPO}:.*|${ECR_REPO}:${IMAGE_TAG}|' /etc/systemd/system/erp-p2p-cloud.service\",
              \"sudo systemctl daemon-reload\",
              \"sudo systemctl restart erp-p2p-cloud\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command: $COMMAND_ID"

          for i in {1..45}; do
            INVOCATION_STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")

            echo "Status: $INVOCATION_STATUS ($i/45)"

            if [ "$INVOCATION_STATUS" = "Success" ]; then
              echo "Deploy command completed"
              break
            elif [ "$INVOCATION_STATUS" = "Failed" ] || [ "$INVOCATION_STATUS" = "Cancelled" ] || [ "$INVOCATION_STATUS" = "TimedOut" ]; then
              echo "Deploy failed: $INVOCATION_STATUS"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text || true
              exit 1
            fi
            sleep 10
          done

      - name: Verify deployment
        working-directory: deployments/terraform
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)

          for i in {1..60}; do
            RESULT=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --instance-ids "$INSTANCE_ID" \
              --parameters 'commands=["curl -sf http://localhost:8080/readyz"]' \
              --query "Command.CommandId" \
              --output text)

            sleep 5

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$RESULT" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")

            if [ "$STATUS" = "Success" ]; then
              echo "Service is healthy!"
              exit 0
            fi
            echo "Waiting for healthy service... ($i/60)"
            sleep 10
          done
          echo "Health check timed out"
          exit 1

  # ===========================================================================
  # Destroy Staging (Manual Only)
  # ===========================================================================
  destroy-staging:
    name: Destroy Staging
    runs-on: ubuntu-latest
    if: inputs.action == 'destroy' && inputs.environment == 'staging'
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: deployments/terraform
        run: terraform init -backend-config=backend-staging.hcl

      - name: Terraform Destroy
        working-directory: deployments/terraform
        run: terraform destroy -auto-approve -var-file=environments/staging.tfvars
