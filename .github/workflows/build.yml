name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # para OIDC con AWS
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: erp-p2p-cloud

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./... -race -timeout 120s -coverprofile=coverage.out
      - run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN{if(c+0<80){print "Cobertura "c"% < 80%"; exit 1}}'

  build-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar QEMU (para arm64)
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generar tag de imagen
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build y Push (linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: VERSION=${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Agregar SSH key
        run: |
          echo "${{ secrets.STAGING_SSH_KEY }}" > /tmp/key.pem
          chmod 600 /tmp/key.pem

      - name: Deploy a staging
        env:
          SSH_KEY_PATH: /tmp/key.pem
        run: ./scripts/deploy.sh staging ${{ needs.build-push.outputs.image_tag }}

      - name: Notificar Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deploy P2P relay staging: ${{ job.status }} — v${{ needs.build-push.outputs.image_tag }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
