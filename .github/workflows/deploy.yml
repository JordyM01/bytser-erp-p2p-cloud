name: Deploy a Producción

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de imagen ECR a desplegar"
        required: true
      confirm:
        description: 'Escribe "PRODUCCION" para confirmar'
        required: true

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  AWS_REGION: us-east-1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validar confirmación
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "PRODUCCION" ]; then
            echo "Confirmación incorrecta. Escribe exactamente: PRODUCCION"
            exit 1
          fi

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production  # requiere aprobación en GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - name: Crear GitHub Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: ${{ github.token }}
          environment: production

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Notificar inicio
        uses: slackapi/slack-github-action@v1
        with:
          payload: '{"text": "Deploy P2P PRODUCCION iniciado: v${{ github.event.inputs.image_tag }} por ${{ github.actor }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Agregar SSH key
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" > /tmp/key.pem
          chmod 600 /tmp/key.pem

      - name: Deploy a producción
        env:
          SSH_KEY_PATH: /tmp/key.pem
        run: ./scripts/deploy.sh prod ${{ github.event.inputs.image_tag }}

      - name: Actualizar estado del deployment
        if: always()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: ${{ job.status == 'success' && 'success' || 'failure' }}

      - name: Notificar resultado
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: '{"text": "${{ job.status == ''success'' && ''OK'' || ''ERROR'' }} Deploy P2P PRODUCCION: ${{ job.status }} — v${{ github.event.inputs.image_tag }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
